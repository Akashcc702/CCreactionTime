<!DOCTYPE html>
<html>
<head>
  <title>Tap the Circle Game</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      background: #222;
      color: white;
      text-align: center;
    }
    canvas {
      background: #111;
      display: block;
      margin: 0 auto;
    }
    #score, #report {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      z-index: 2;
    }
    #score { top: 10px; }
    #report {
      top: 60px;
      color: #00ff99;
      font-size: 22px;
      max-width: 94%;
      word-wrap: break-word;
    }
    #setup {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      background: #333;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px #000;
    }
    input {
      padding: 10px;
      margin: 10px;
      font-size: 18px;
      border-radius: 5px;
      border: none;
      width: 220px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      background-color: #00cc66;
      color: white;
      margin: 5px;
      transition: 0.2s;
    }
    button:hover { background-color: #00994d; }

    /* Leaderboard popup */
    #leaderboardPopup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #333;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px #000;
      z-index: 10;
      text-align: center;
      color: white;
      width: 92%;
      max-width: 520px;
    }
    #leaderboardPopup h3 { color: #00ff99; margin: 0 0 8px 0; }
    #leaderboardPopup table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
      text-align: center;
      color: white;
    }
    #leaderboardPopup th, #leaderboardPopup td {
      padding: 6px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
    }
    #leaderboardPopup button {
      background-color: #ff3333;
      margin-top: 12px;
    }
    #leaderboardPopup button:hover {
      background-color: #cc0000;
    }

    /* Loading Spinner */
    .spinner {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #00ff99;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width:480px){
      input { width: 180px; font-size:16px; }
      #report { font-size:18px; top:70px; }
      button { font-size:16px; padding:8px 12px; }
    }
  </style>
</head>
<body>

<div id="setup">
  <h2>Tap the Circle Game</h2>
  <input type="text" id="playerName" placeholder="Enter Name (optional)"><br>
  <input type="number" id="targetInput" placeholder="Target Score" min="1" value=""><br>
  <button onclick="startGame()">🎮 Start Game</button>
  <button onclick="showOnlineSpeedLeaderboard()">🏆 View Leaderboard</button>
</div>

<div id="score" style="display:none;">Score: 0</div>
<div id="report"></div>
<canvas id="gameCanvas"></canvas>

<!-- Leaderboard Popup -->
<div id="leaderboardPopup">
  <h3>🏆 Fastest 3 Players (Speed per Tap)</h3>
  <div id="leaderboardTable" aria-live="polite"></div>
  <button onclick="closeLeaderboard()">Close</button>
</div>

<script>
const SHEET_URL = "https://api.sheetbest.com/sheets/5da5e4f8-b8e3-4262-937a-877913c1ae16";

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  // keep canvas full-window
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let score = 0, targetScore = 10, startTime = 0, gameOver = false, playerName = "";
let circle = { x: 0, y: 0, r: 45 };
let timerStarted = false;
let running = false; // animation loop flag

// draw circle (single frame)
function drawCircle() {
  ctx.beginPath();
  ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
  ctx.fillStyle = 'red';
  ctx.fill();
  ctx.closePath();
}

function resetCircle() {
  // keep circle fully inside canvas (80 px margin)
  circle.x = Math.random() * Math.max(0, (canvas.width - 160)) + 80;
  circle.y = Math.random() * Math.max(0, (canvas.height - 160)) + 80;
}

// animation loop to ensure circle stays visible (no blink)
function animate() {
  // Clear entire canvas every frame
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (running && !gameOver) {
    // draw circle every frame (so it won't disappear on resize / redraw)
    drawCircle();
  }

  requestAnimationFrame(animate);
}
// start the animation loop once
requestAnimationFrame(animate);

// input handlers (touch + mouse)
canvas.addEventListener('touchstart', e => {
  // prevent default so viewport doesn't shift on some phones
  e.preventDefault();
  const t = e.touches[0];
  handleTap(t.clientX, t.clientY);
}, {passive: false});
canvas.addEventListener('mousedown', e => { handleTap(e.clientX, e.clientY); });

function handleTap(x, y) {
  if (gameOver) return;
  const dx = x - circle.x, dy = y - circle.y;

  if (!timerStarted) {
    startTime = performance.now();
    timerStarted = true;
  }

  if (dx * dx + dy * dy < circle.r * circle.r) {
    score++;
    document.getElementById('score').innerText = 'Score: ' + score;

    if (score >= targetScore) {
      gameOver = true;
      running = false; // stop drawing (optional)
      showReport();
    } else {
      // place next circle and keep rendering
      resetCircle();
    }
  }
}

// Game summary
async function showReport() {
  const endTime = performance.now();
  const timeTaken = ((endTime - startTime) / 1000);
  const averageSpeed = (timeTaken / score).toFixed(2);
  const nameText = playerName ? `👤 Player: <span style="color:#87ceeb">${playerName}</span><br>` : '';

  let savedNote = "";
  if (score > 4) {
    try {
      await saveOnline(playerName || "Unknown", score, timeTaken, averageSpeed);
      savedNote = `<div style="color:#00ff99">Saved to global leaderboard ✅</div>`;
    } catch {
      savedNote = `<div style="color:#ffcc66">Offline — try later.</div>`;
    }
  }

  document.getElementById('report').innerHTML = `
    🎯 Score: <span style="color:#00ff00">${score}</span><br>
    ⏱️ Time: <span style="color:#ffcc00">${timeTaken.toFixed(2)}s</span><br>
    ⚡ Speed per Tap: <span style="color:#ff6699">${averageSpeed}s</span><br>
    ${nameText}${savedNote}<br><br>
    <button onclick="tryAgain()">🔁 Try Again</button>
    <button onclick="goToMenu()">🏠 Menu</button>
    <button onclick="showOnlineSpeedLeaderboard()">🏆 Leaderboard</button>
  `;
}

// Save to online sheet
async function saveOnline(name, scoreVal, time, speed) {
  const data = [{ name, score: scoreVal, time: time.toFixed(2), speed }];
  const res = await fetch(SHEET_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error("Failed");
}

// Leaderboard
async function showOnlineSpeedLeaderboard() {
  const tableDiv = document.getElementById("leaderboardTable");
  document.getElementById("leaderboardPopup").style.display = "block";
  tableDiv.innerHTML = '<div class="spinner"></div><p>Loading leaderboard...</p>';

  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    const list = (data || []).map(r => ({
      name: r.name || "Unknown",
      score: Number(r.score) || 0,
      time: Number(r.time) || 0,
      speed: parseFloat(r.speed) || 999
    })).filter(r => r.score > 0);
    list.sort((a, b) => a.speed - b.speed);
    const top = list.slice(0, 3);

    if (top.length === 0) {
      tableDiv.innerHTML = "<p>No records yet.</p>";
      return;
    }

    let html = `<table><tr><th>Rank</th><th>Name</th><th>Score</th><th>Speed</th><th>Time</th></tr>`;
    top.forEach((p, i) => {
      html += `<tr>
        <td>${i + 1}</td><td>${p.name}</td>
        <td>${p.score}</td><td>${p.speed.toFixed(2)}s</td>
        <td>${p.time.toFixed(2)}s</td></tr>`;
    });
    html += `</table>`;
    tableDiv.innerHTML = html;
  } catch {
    tableDiv.innerHTML = "<p>⚠️ Failed to load leaderboard.</p>";
  }
}
function closeLeaderboard(){ document.getElementById("leaderboardPopup").style.display="none"; }

// Reset / Menu functions
function tryAgain(){
  score = 0;
  gameOver = false;
  timerStarted = false;
  document.getElementById('report').innerHTML = '';
  document.getElementById('score').innerText = 'Score: 0';
  running = true;
  resetCircle();
}
function goToMenu(){
  document.getElementById('setup').style.display = 'block';
  document.getElementById('score').style.display = 'none';
  document.getElementById('report').innerHTML = '';
  ctx.clearRect(0,0,canvas.width,canvas.height);
  running = false;
}

// Start game (now places circle immediately and starts the render loop)
function startGame(){
  const inputScore = parseInt(document.getElementById('targetInput').value);
  if (isNaN(inputScore) || inputScore <= 0){
    alert("Enter valid target score");
    return;
  }
  targetScore = inputScore;
  playerName = document.getElementById('playerName').value.trim();
  score = 0; gameOver = false; timerStarted = false;
  document.getElementById('score').innerText = 'Score: 0';
  document.getElementById('report').innerText = '';
  document.getElementById('score').style.display = 'block';
  document.getElementById('setup').style.display = 'none';

  // ensure circle is placed and the animation loop renders it continuously
  resetCircle();
  running = true;
}
</script>
</body>
</html>
